<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Set New Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Orbitron:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>
  <div class="auth-card">
    <h1 class="auth-title">Set New Password</h1>
    <p class="auth-subtitle">Choose a strong new password for your account.</p>
    <form id="resetPasswordForm" novalidate>
      <div class="auth-field">
        <label for="newPassword">New Password</label>
        <input id="newPassword" name="password" type="password" placeholder="••••••••" required />
      </div>
      <div class="auth-field">
        <label for="confirmNewPassword">Confirm New Password</label>
        <input id="confirmNewPassword" type="password" placeholder="••••••••" required />
      </div>
      <div class="auth-actions">
        <button type="submit" class="auth-btn">Reset Password</button>
      </div>
      <p class="alt"><a href="login.html">Back to Sign in</a></p>
    </form>
  </div>
  <div id="authBanner" class="auth-banner" style="display:none" aria-live="polite"></div>

  <script src="js/show-banner.js"></script>
</body>
</html>
