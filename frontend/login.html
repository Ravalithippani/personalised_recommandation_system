<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORO - Sign In</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Orbitron:wght@700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="css/auth-interactive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body>
    <div class="auth-card">
        <h1 class="auth-title">ORO</h1>
        <p class="auth-subtitle">Discover your next favorite movies, books, and music</p>

        <div id="authBanner" class="auth-banner" aria-live="polite" style="display:none;"></div>

        <form id="signinForm" novalidate>
            <div class="auth-field">
                <label for="signinEmail">Email</label>
                <input id="signinEmail" name="email" type="email" placeholder="you@example.com" required />
            </div>

            <div class="auth-field password-field">
                <label for="signinPassword">Password</label>
                <input id="signinPassword" name="password" type="password" placeholder="••••••••" required />
                <button type="button" class="toggle-password">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                </button>
            </div>

            <div class="form-row">
                <div class="checkbox-row">
                    <input type="checkbox" id="rememberMe">
                    <label for="rememberMe">Remember me</label>
                </div>
                <div class="forgot-link">
                    <a href="forgot-password.html">Forgot password?</a>
                </div>
            </div>

            <div class="auth-actions">
                <button type="submit" class="auth-btn">Sign In</button>
            </div>

            <div class="divider" style="display: flex; align-items: center; gap: 10px;">
                <span>or continue with</span>
                <div class="g_id_signin" data-type="standard" data-size="large" data-theme="outline"
                    data-text="sign_in_with" data-shape="rectangular"
                    style="margin: 0; padding: 0; border: none; background: none;"></div>
            </div>

            <div class="alt">
                Don't have an account? <a href="signup.html">Sign Up</a>
            </div>
        </form>
    </div>

    <script>
        window.AUTH_API_BASE = window.AUTH_API_BASE || "http://localhost:8081";
        window.MAIN_PAGE = window.MAIN_PAGE || "index.html";

        window.handleCredentialResponse = async function (response) {
            const { credential } = response;
            console.log("Google token received:", credential);

            try {
                const res = await fetch(`${AUTH_API_BASE}/api/auth/google`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ token: credential }),
                });

                if (res.ok) {
                    const data = await res.json();
                    localStorage.setItem("auth_token", data.token);
                    localStorage.setItem("currentUser", JSON.stringify(data.user));
                    window.location.href = "index.html";
                } else {
                    console.error("Auth failed:", await res.text());
                    alert("Google sign-in failed. Please try again.");
                }
            } catch (error) {
                console.error("Google auth error:", error);
                alert("Connection error. Check backend.");
            }
        };
    </script>
    <div id="g_id_onload" data-client_id="349379703446-k4gnnssr1aesi091kbe84pr1omj3nl1j.apps.googleusercontent.com"
        data-callback="handleCredentialResponse" data-auto_prompt="false">
    </div>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="js/auth.js"></script>
    <script src="js/auth-interactive.js"></script>
</body>

</html>
